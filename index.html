<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/Favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. SEO Title (Max 60 characters) -->
    <title>Aayam Regent LLP | Premium Travel & Hospitality Services</title>

    <!-- 2. Meta Description (Max 160 characters) -->
    <meta name="description" content="Discover premium hospitality and seamless travel management with Aayam Regent LLP. We curate luxury stays, corporate tours, and unforgettable travel experiences." />

    <!-- 3. Robots Tag (Google ko allow karne ke liye) -->
    <meta name="robots" content="index, follow" />

    <!-- 4. Open Graph Tags (Jab link WhatsApp/LinkedIn pe share karoge toh mast card dikhega) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aayam Regent LLP | Premium Travel & Hospitality" />
    <meta property="og:description" content="Discover premium hospitality and seamless travel management with Aayam Regent LLP." />
    <meta property="og:url" content="https://www.aayamregent.in/" />

    <!-- 5. Schema Markup / Structured Data (AI aur Google Search ke liye naya danda) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Aayam Regent LLP",
      "url": "https://www.aayamregent.in/",
      "logo": "https://www.aayamregent.in/src/assets/Favicon.png",
      "description": "Premium hospitality and customized travel management services in India.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
